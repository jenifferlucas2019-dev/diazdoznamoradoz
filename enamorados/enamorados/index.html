<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>❤️❤️❤️</title>
</head>
<body>

    <header>
        <nav>
            <div class="logo">NAmoradinha Page</div>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#galeria">Galeria</a></li>
                <li><a href="#contato">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        
        <section id="galeria">
            <h2>Nossa Galeria</h2>
            <div class="galeria">
                <div class="galeria-item">
                    <img src="https://picsum.photos/600/400?random=1" alt="Natureza 1" class="img-clicavel">
                </div>
                <div class="galeria-item">
                    <img src="https://picsum.photos/600/400?random=2" alt="Natureza 2" class="img-clicavel">
                </div>
                <div class="galeria-item">
                    <img src="https://picsum.photos/600/400?random=3" alt="Natureza 3" class="img-clicavel">
                </div>
                <div class="galeria-item">
                    <img src="https://picsum.photos/600/400?random=4" alt="Cidade 1" class="img-clicavel">
                </div>
                <div class="galeria-item">
                    <img src="https://picsum.photos/600/400?random=5" alt="Cidade 2" class="img-clicavel">
                </div>
                <div class="galeria-item">
                    <img src="https://picsum.photos/600/400?random=6" alt="Cidade 3" class="img-clicavel">
                </div>
            </div>
        </section>

        <section id="contato">
            <h2>Fale Conosco</h2>
            <div class="contato-container">
                <div class="contato-info">
                    <h3>Informações</h3>
                    <br>
                    <p><strong>Endereço:</strong> Av. Paulista, 1000 - São Paulo, SP</p>
                    <br>
                    <p><strong>E-mail:</strong> contato@exemplo.com</p>
                </div>
                
                <form class="contato-form" id="meuFormulario">
                    <div class="form-group">
                        <label for="nome">Nome:</label>
                        <input type="text" id="nome" required placeholder="Digite seu nome">
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail:</label>
                        <input type="email" id="email" required placeholder="seuemail@exemplo.com">
                    </div>
                    <div class="form-group">
                        <label for="mensagem">Mensagem:</label>
                        <textarea id="mensagem" rows="4" required placeholder="Como podemos ajudar?"></textarea>
                    </div>
                    <button type="submit">Enviar Mensagem</button>
                </form>
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 FlexPage. Criado com Flexbox, HTML, CSS e JS.</p>
    </footer>

<script src="script.js"></script>
</body>
</html>
